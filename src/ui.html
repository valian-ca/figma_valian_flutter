<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Generate Dart Code</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      background: #fff;
      padding: 16px;
    }

    h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #1a1a1a;
    }

    .button-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    button {
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      background: #f6f8fa;
      color: #24292f;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover {
      background: #eaeef2;
      border-color: #b0b8c1;
    }
    button:active {
      background: #d8dee4;
    }

    .btn-primary {
      background: #0969da;
      border-color: #0969da;
      color: #fff;
    }
    .btn-primary:hover {
      background: #0757b5;
      border-color: #0757b5;
    }
    .btn-primary:active {
      background: #054a96;
    }

    #codeBlock {
      height: 335px;
      overflow: auto;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 12px;
      background: #f6f8fa;
      font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #1f2328;
    }

    #copyButton {
      margin-top: 8px;
    }

    #checkResult {
      display: none;
      overflow: auto;
      max-height: 400px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 12px;
      background: #f6f8fa;
      font-size: 13px;
      line-height: 1.5;
    }

    .status-clean { color: #1a7f37; font-weight: 600; }
    .status-issues { color: #cf222e; font-weight: 600; }
    .status-error { color: #953800; font-weight: 600; }

    .issue-section { margin-top: 14px; }
    .issue-section h4 {
      margin: 0 0 6px 0;
      font-size: 13px;
      font-weight: 600;
    }

    .issue-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .issue-table th, .issue-table td {
      border: 1px solid #d0d7de;
      padding: 5px 8px;
      text-align: left;
    }
    .issue-table th {
      background: #eaeef2;
      font-weight: 600;
    }
    .issue-table tr:hover td {
      background: #f0f4f8;
    }

    .node-link {
      color: #0969da;
      cursor: pointer;
      text-decoration: none;
    }
    .node-link:hover {
      color: #0550ae;
      text-decoration: underline;
    }

    .color-swatch {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 2px;
      vertical-align: middle;
      margin-right: 4px;
    }
  </style>
</head>

<body>
  <h2>Figma VALIAN Flutter</h2>
  <div class="button-row">
    <button id="generateTextStyles" class="btn-primary">Generate TextStyles</button>
    <button id="generateColors" class="btn-primary">Generate Colors</button>
    <button id="checkDesign">Check Design</button>
  </div>

  <div id="codeSection" style="display: none;">
    <pre id="codeBlock"></pre>
    <p><button id="copyButton" onclick="copyToClipboard()">Copy</button></p>
  </div>

  <div id="checkResult"></div>
  <script>
    // Logic for button click and checkbox state
    document.getElementById('generateTextStyles').onclick = () => {
      window.parent.postMessage({ pluginMessage: { type: 'generate-textstyles' } }, '*');
    };

    document.getElementById('generateColors').onclick = () => {
      window.parent.postMessage({ pluginMessage: { type: 'generate-colors' } }, '*');
    };

    document.getElementById('checkDesign').onclick = () => {
      document.getElementById('codeSection').style.display = 'none';
      document.getElementById('checkResult').style.display = 'block';
      document.getElementById('checkResult').innerHTML = 'Checking…';
      window.parent.postMessage({ pluginMessage: { type: 'design-check' } }, '*');
    };

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (msg.type === 'dart-code') {
        document.getElementById('codeBlock').textContent = msg.code;
        document.getElementById('codeSection').style.display = 'block';
        document.getElementById('checkResult').style.display = 'none';
      }
      if (msg.type === 'design-check-result') {
        renderCheckResult(msg.result);
      }
    };

    function renderCheckResult(result) {
      const el = document.getElementById('checkResult');
      el.style.display = 'block';

      if (result.status === 'ERROR') {
        el.innerHTML = '<span class="status-error">' + escapeHtml(result.error) + '</span>';
        return;
      }

      const statusClass = result.status === 'CLEAN' ? 'status-clean' : 'status-issues';
      let html = '<strong>Status:</strong> <span class="' + statusClass + '">' + result.status + '</span>';
      html += ' &nbsp;|&nbsp; <strong>Nodes scanned:</strong> ' + result.nodesScanned;

      if (result.hardcodedColors.length > 0) {
        const grouped = {};
        result.hardcodedColors.forEach(function(c) {
          const key = c.hex;
          if (!grouped[key]) grouped[key] = [];
          grouped[key].push(c);
        });
        html += '<div class="issue-section"><h4>Hardcoded Colors (' + result.hardcodedColors.length + ')</h4>';
        html += '<table class="issue-table"><tr><th>Color</th><th>Nodes</th><th>Type</th></tr>';
        Object.keys(grouped).forEach(function(hex) {
          const items = grouped[hex];
          const nodes = items.map(function(i) { return '<span class="node-link" data-node-id="' + escapeHtml(i.nodeId) + '">' + escapeHtml(i.nodeName) + '</span>'; }).join(', ');
          const types = items.map(function(i) { return i.property; }).filter(function(v, i, a) { return a.indexOf(v) === i; }).join(', ');
          html += '<tr><td><span class="color-swatch" style="background:' + hex + '"></span>' + hex + '</td>';
          html += '<td>' + nodes + '</td><td>' + types + '</td></tr>';
        });
        html += '</table></div>';
      }

      if (result.unboundTextStyles.length > 0) {
        html += '<div class="issue-section"><h4>Unbound Text Styles (' + result.unboundTextStyles.length + ')</h4>';
        html += '<table class="issue-table"><tr><th>Node</th><th>Font</th><th>Size</th><th>Weight</th><th>Preview</th></tr>';
        result.unboundTextStyles.forEach(function(t) {
          html += '<tr><td><span class="node-link" data-node-id="' + escapeHtml(t.nodeId) + '">' + escapeHtml(t.nodeName) + '</span></td>';
          html += '<td>' + escapeHtml(t.fontFamily) + '</td>';
          html += '<td>' + t.fontSize + '</td>';
          html += '<td>' + t.fontWeight + '</td>';
          html += '<td>' + escapeHtml(t.preview) + '</td></tr>';
        });
        html += '</table></div>';
      }

      if (result.hardcodedColors.length === 0 && result.unboundTextStyles.length === 0) {
        html += '<p>All colors are bound to variables and all text nodes use shared styles.</p>';
      }

      el.innerHTML = html;
      el.querySelectorAll('.node-link').forEach(function(link) {
        link.addEventListener('click', function() {
          var nodeId = this.getAttribute('data-node-id');
          window.parent.postMessage({ pluginMessage: { type: 'select-node', nodeId: nodeId } }, '*');
        });
      });
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    // Function to copy text inside the <pre> tag to clipboard
    function copyToClipboard() {
      const text = document.getElementById('codeBlock').innerText;
      const textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      document.getElementById('copyButton').textContent = 'Copied!';
      setTimeout(() => { document.getElementById('copyButton').textContent = 'Copy'; }, 1500);
    }

  </script>
</body>

</html>
